<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Редактор Видео и Аудио</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .logo {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
        }

        .header h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-top: 4px;
        }

        /* === ОСНОВНЫЕ ЭЛЕМЕНТЫ === */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-area .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        /* === ПЛЕЕР === */
        .player-section {
            display: none;
            margin-bottom: 24px;
        }

        .player-section.visible {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-section video,
        .player-section audio {
            width: 100%;
            border-radius: 12px;
            background: #000;
            max-height: 400px;
        }

        .file-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .file-info .name {
            color: #fff;
            font-weight: 500;
        }

        .file-info .size {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        /* === НАСТРОЙКИ === */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }

        .control-group {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .control-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #667eea;
            background: transparent;
            cursor: pointer;
        }

        .control-group .value {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-align: right;
            margin-top: 4px;
        }

        .control-group input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .control-group input[type="number"]:focus {
            border-color: #667eea;
        }

        /* === КНОПКИ === */
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
        }

        .btn-success:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }

        .btn-danger:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-outline:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        /* === ПРОГРЕСС === */
        .progress-section {
            display: none;
            margin-top: 16px;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .progress-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        /* === ЛОГ === */
        .log {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            max-height: 100px;
            overflow-y: auto;
            display: none;
            line-height: 1.6;
        }

        .log.visible {
            display: block;
        }

        .log .error { color: #f87171; }
        .log .success { color: #34d399; }
        .log .info { color: #60a5fa; }

        /* === ФУТЕР === */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== ЗАГОЛОВОК ===== -->
        <div class="header">
            <span class="logo">🎬</span>
            <h1>Media <span>Editor</span></h1>
            <p>Обрезай видео, увеличивай громкость, конвертируй</p>
        </div>

        <!-- ===== ЗАГРУЗКА ===== -->
        <div class="upload-area" id="uploadArea">
            <span class="icon">📁</span>
            <div>Перетащи файл сюда или нажми для выбора</div>
            <div style="font-size:12px;margin-top:8px;color:rgba(255,255,255,0.3);">
                Поддерживаются: MP4, AVI, MKV, MOV, MP3, WAV, AAC, FLAC
            </div>
            <input type="file" id="fileInput" accept="video/*,audio/*">
        </div>

        <!-- ===== ИНФОРМАЦИЯ О ФАЙЛЕ ===== -->
        <div class="player-section" id="playerSection">
            <div class="file-info">
                <span class="name" id="fileName">file.mp4</span>
                <span class="size" id="fileSize">0 MB</span>
                <span class="size" id="fileType">видео</span>
            </div>

            <div id="playerContainer">
                <video id="mediaPlayer" controls></video>
            </div>
        </div>

        <!-- ===== НАСТРОЙКИ ===== -->
        <div class="player-section" id="controlsSection">
            <div class="controls">
                <div class="control-group">
                    <label>✂️ Начало (сек)</label>
                    <input type="range" id="startTime" min="0" max="100" value="0" step="0.1">
                    <div class="value" id="startValue">0.0</div>
                </div>
                <div class="control-group">
                    <label>✂️ Конец (сек)</label>
                    <input type="range" id="endTime" min="0" max="100" value="100" step="0.1">
                    <div class="value" id="endValue">0.0</div>
                </div>
                <div class="control-group">
                    <label>🔊 Громкость (увеличение)</label>
                    <input type="range" id="volumeBoost" min="1" max="10" value="1" step="0.1">
                    <div class="value" id="volumeValue">1.0x</div>
                </div>
                <div class="control-group">
                    <label>📐 Размер превью</label>
                    <select id="previewSize" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:14px;outline:none;">
                        <option value="480">480p (маленький)</option>
                        <option value="720" selected>720p (средний)</option>
                        <option value="1080">1080p (большой)</option>
                    </select>
                </div>
            </div>

            <!-- ===== КНОПКИ ===== -->
            <div class="actions">
                <button class="btn btn-success" id="trimBtn">✂️ Обрезать</button>
                <button class="btn btn-primary" id="volumeBtn">🔊 Увеличить громкость</button>
                <button class="btn btn-outline" id="previewBtn">👁️ Превью</button>
                <button class="btn btn-danger" id="resetBtn">🔄 Сбросить</button>
            </div>
        </div>

        <!-- ===== ПРОГРЕСС ===== -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">Обработка...</div>
        </div>

        <!-- ===== ЛОГ ===== -->
        <div class="log" id="log"></div>

        <!-- ===== ФУТЕР ===== -->
        <div class="footer">
            🎵 Всё обрабатывается локально в твоём браузере &bull; Файлы не покидают твой компьютер
        </div>
    </div>

    <script>
        // ============================================================
        //  ПОЛНАЯ ЛОГИКА РАБОТЫ (без сторонних библиотек)
        // ============================================================

        // === ЭЛЕМЕНТЫ ===
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const playerSection = document.getElementById('playerSection');
        const controlsSection = document.getElementById('controlsSection');
        const mediaPlayer = document.getElementById('mediaPlayer');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileType = document.getElementById('fileType');
        const startTime = document.getElementById('startTime');
        const endTime = document.getElementById('endTime');
        const startValue = document.getElementById('startValue');
        const endValue = document.getElementById('endValue');
        const volumeBoost = document.getElementById('volumeBoost');
        const volumeValue = document.getElementById('volumeValue');
        const previewSize = document.getElementById('previewSize');
        const trimBtn = document.getElementById('trimBtn');
        const volumeBtn = document.getElementById('volumeBtn');
        const previewBtn = document.getElementById('previewBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const log = document.getElementById('log');

        let currentFile = null;
        let currentFileUrl = null;
        let mediaType = 'video';
        let isProcessing = false;

        // === ЛОГГЕР ===
        function addLog(message, type = 'info') {
            log.classList.add('visible');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // === ЗАГРУЗКА ФАЙЛА ===
        function loadFile(file) {
            if (!file) return;

            currentFile = file;
            const url = URL.createObjectURL(file);
            currentFileUrl = url;

            // Определяем тип
            const type = file.type.startsWith('video/') ? 'video' : 'audio';
            mediaType = type;

            // Обновляем информацию
            fileName.textContent = file.name;
            fileSize.textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
            fileType.textContent = type === 'video' ? '🎬 видео' : '🎵 аудио';

            // Загружаем в плеер
            if (type === 'video') {
                mediaPlayer = document.createElement('video');
                mediaPlayer.controls = true;
                mediaPlayer.style.width = '100%';
                mediaPlayer.style.maxHeight = '400px';
                mediaPlayer.style.borderRadius = '12px';
                mediaPlayer.style.background = '#000';
            } else {
                mediaPlayer = document.createElement('audio');
                mediaPlayer.controls = true;
                mediaPlayer.style.width = '100%';
            }

            const container = document.getElementById('playerContainer');
            container.innerHTML = '';
            container.appendChild(mediaPlayer);

            mediaPlayer.src = url;
            mediaPlayer.load();

            // Показываем секции
            playerSection.classList.add('visible');
            controlsSection.classList.add('visible');

            // Настраиваем слайдеры
            mediaPlayer.addEventListener('loadedmetadata', () => {
                const duration = mediaPlayer.duration;
                startTime.max = duration;
                endTime.max = duration;
                endTime.value = duration;
                startValue.textContent = '0.0';
                endValue.textContent = duration.toFixed(1);
            });

            addLog(`✅ Загружен: ${file.name} (${type})`, 'success');
        }

        // === ОБРЕЗКА ===
        async function trimMedia() {
            if (!currentFile || isProcessing) return;
            isProcessing = true;

            const start = parseFloat(startTime.value);
            const end = parseFloat(endTime.value);
            const duration = end - start;

            if (duration <= 0) {
                addLog('❌ Ошибка: конец должен быть больше начала', 'error');
                isProcessing = false;
                return;
            }

            addLog(`✂️ Обрезка: ${start.toFixed(1)}с — ${end.toFixed(1)}с (${duration.toFixed(1)}с)`, 'info');
            showProgress(true);

            try {
                const result = await processMedia(currentFile, {
                    start,
                    end,
                    volume: parseFloat(volumeBoost.value),
                    trim: true
                });

                downloadFile(result, `trimmed_${currentFile.name}`);
                addLog('✅ Обрезка завершена!', 'success');
            } catch (err) {
                addLog(`❌ Ошибка: ${err.message}`, 'error');
                console.error(err);
            }

            showProgress(false);
            isProcessing = false;
        }

        // === УВЕЛИЧЕНИЕ ГРОМКОСТИ ===
        async function boostVolume() {
            if (!currentFile || isProcessing) return;
            isProcessing = true;

            const volume = parseFloat(volumeBoost.value);
            if (volume <= 1) {
                addLog('⚠️ Установи громкость > 1x для увеличения', 'error');
                isProcessing = false;
                return;
            }

            addLog(`🔊 Увеличение громкости: ${volume}x`, 'info');
            showProgress(true);

            try {
                const result = await processMedia(currentFile, {
                    start: 0,
                    end: 0,
                    volume: volume,
                    trim: false
                });

                downloadFile(result, `boosted_${currentFile.name}`);
                addLog('✅ Громкость увеличена!', 'success');
            } catch (err) {
                addLog(`❌ Ошибка: ${err.message}`, 'error');
                console.error(err);
            }

            showProgress(false);
            isProcessing = false;
        }

        // === ОСНОВНАЯ ФУНКЦИЯ ОБРАБОТКИ (использует Canvas + Web Audio) ===
        function processMedia(file, options) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const video = document.createElement('video');
                video.src = url;
                video.muted = true;
                video.crossOrigin = 'anonymous';

                video.onloadedmetadata = () => {
                    const duration = video.duration;
                    let start = options.start || 0;
                    let end = options.end || duration;
                    const volume = options.volume || 1;
                    const trim = options.trim || false;

                    if (trim) {
                        // Обрезка
                        const trimmedDuration = end - start;
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        // Настройки размера
                        const size = parseInt(previewSize.value);
                        const isVideo = file.type.startsWith('video/');
                        const width = isVideo ? Math.min(video.videoWidth, size) : 640;
                        const height = isVideo ? Math.min(video.videoHeight, Math.round(size * 0.5625)) : 0;

                        canvas.width = width;
                        canvas.height = height || 100;

                        // Создаём аудио контекст
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const mediaStream = video.captureStream();
                        const source = audioCtx.createMediaStreamSource(mediaStream);
                        const gainNode = audioCtx.createGain();
                        gainNode.gain.value = volume;

                        // Настраиваем аудио
                        const audioDestination = audioCtx.createMediaStreamDestination();
                        source.connect(gainNode);
                        gainNode.connect(audioDestination);

                        // Объединяем видео и аудио
                        const combinedStream = new MediaStream();
                        const videoTrack = mediaStream.getVideoTracks()[0];
                        if (videoTrack) combinedStream.addTrack(videoTrack);
                        audioDestination.stream.getTracks().forEach(t => combinedStream.addTrack(t));

                        const chunks = [];
                        const recorder = new MediaRecorder(combinedStream, {
                            mimeType: 'video/webm;codecs=vp9,opus'
                        });

                        recorder.ondataavailable = (e) => {
                            if (e.data.size > 0) chunks.push(e.data);
                        };

                        recorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            resolve(blob);
                            video.remove();
                            URL.revokeObjectURL(url);
                        };

                        // Запускаем запись
                        recorder.start(100);
                        video.currentTime = start;
                        video.play();

                        const interval = setInterval(() => {
                            if (video.currentTime >= end) {
                                video.pause();
                                clearInterval(interval);
                                recorder.stop();
                            }
                        }, 100);

                        // Рендерим видео на canvas (для сохранения кадров)
                        const renderCanvas = document.createElement('canvas');
                        const renderCtx = renderCanvas.getContext('2d');

                        if (isVideo) {
                            renderCanvas.width = width;
                            renderCanvas.height = height;
                            document.body.appendChild(renderCanvas);
                            renderCanvas.style.display = 'none';

                            const renderInterval = setInterval(() => {
                                renderCtx.drawImage(video, 0, 0, width, height);
                            }, 33);
                        }

                    } else {
                        // Только изменение громкости (без обрезки)
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        const isVideo = file.type.startsWith('video/');
                        const size = parseInt(previewSize.value);
                        const width = isVideo ? Math.min(video.videoWidth, size) : 640;
                        const height = isVideo ? Math.min(video.videoHeight, Math.round(size * 0.5625)) : 0;

                        canvas.width = width;
                        canvas.height = height || 100;

                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const mediaStream = video.captureStream();
                        const source = audioCtx.createMediaStreamSource(mediaStream);
                        const gainNode = audioCtx.createGain();
                        gainNode.gain.value = volume;

                        const audioDestination = audioCtx.createMediaStreamDestination();
                        source.connect(gainNode);
                        gainNode.connect(audioDestination);

                        const combinedStream = new MediaStream();
                        const videoTrack = mediaStream.getVideoTracks()[0];
                        if (videoTrack) combinedStream.addTrack(videoTrack);
                        audioDestination.stream.getTracks().forEach(t => combinedStream.addTrack(t));

                        const chunks = [];
                        const recorder = new MediaRecorder(combinedStream, {
                            mimeType: 'video/webm;codecs=vp9,opus'
                        });

                        recorder.ondataavailable = (e) => {
                            if (e.data.size > 0) chunks.push(e.data);
                        };

                        recorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            resolve(blob);
                            video.remove();
                            URL.revokeObjectURL(url);
                        };

                        recorder.start(100);
                        video.play();

                        const duration = video.duration;
                        const interval = setInterval(() => {
                            if (video.currentTime >= duration) {
                                video.pause();
                                clearInterval(interval);
                                recorder.stop();
                            }
                        }, 100);
                    }
                };

                video.onerror = () => {
                    reject(new Error('Ошибка загрузки видео/аудио'));
                    video.remove();
                    URL.revokeObjectURL(url);
                };
            });
        }

        // === СКАЧИВАНИЕ ===
        function downloadFile(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name.replace(/\.[^/.]+$/, '') + '.webm';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
        }

        // === ПРОГРЕСС ===
        function showProgress(show) {
            progressSection.classList.toggle('visible', show);
        }

        // === ПРЕВЬЮ ===
        function previewTrim() {
            const start = parseFloat(startTime.value);
            const end = parseFloat(endTime.value);
            if (mediaPlayer) {
                mediaPlayer.currentTime = start;
                mediaPlayer.play();
                const check = setInterval(() => {
                    if (mediaPlayer.currentTime >= end) {
                        mediaPlayer.pause();
                        clearInterval(check);
                    }
                }, 100);
                addLog(`👁️ Превью: ${start.toFixed(1)}с — ${end.toFixed(1)}с`, 'info');
            }
        }

        // === СБРОС ===
        function resetAll() {
            if (currentFileUrl) {
                URL.revokeObjectURL(currentFileUrl);
            }
            currentFile = null;
            currentFileUrl = null;
            playerSection.classList.remove('visible');
            controlsSection.classList.remove('visible');
            log.classList.remove('visible');
            log.innerHTML = '';
            fileInput.value = '';
            addLog('🔄 Сброшено', 'info');
        }

        // === ОБРАБОТЧИКИ ===
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = 'rgba(255,255,255,0.2)';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(255,255,255,0.2)';
            if (e.dataTransfer.files.length) {
                loadFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                loadFile(fileInput.files[0]);
            }
        });

        // Слайдеры
        startTime.addEventListener('input', () => {
            startValue.textContent = parseFloat(startTime.value).toFixed(1);
        });
        endTime.addEventListener('input', () => {
            endValue.textContent = parseFloat(endTime.value).toFixed(1);
        });
        volumeBoost.addEventListener('input', () => {
            volumeValue.textContent = parseFloat(volumeBoost.value).toFixed(1) + 'x';
        });

        // Кнопки
        trimBtn.addEventListener('click', trimMedia);
        volumeBtn.addEventListener('click', boostVolume);
        previewBtn.addEventListener('click', previewTrim);
        resetBtn.addEventListener('click', resetAll);

        addLog('🎬 Редактор загружен! Загрузи видео или аудио для начала работы.', 'info');
    </script>
</body>
</html>
